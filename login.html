<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RouteWave | Log In</title>
  <meta
    name="description"
    content="Log in to RouteWave to manage rides, profile details, and trip activity."
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">
  <div class="page-glow glow-left" aria-hidden="true"></div>
  <div class="page-glow glow-right" aria-hidden="true"></div>

  <div id="site-header-root"></div>

  <main class="subpage-main">
    <section class="auth-page">
      <div class="auth-copy">
        <p class="eyebrow">Account access</p>
        <h2>Log in to manage bookings, alerts, and saved places.</h2>
        <p>
          This is now a dedicated page from the top bar, matching the multi-page navigation flow you requested.
        </p>
      </div>

      <div class="auth-panel">
        <form>
          <label class="field">
            <span>Email address</span>
            <input type="email" placeholder="name@example.com">
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" placeholder="Enter password">
          </label>

          <button class="button-primary" type="button">Log in</button>
        </form>

        <p class="auth-helper">
          New here? <a class="text-link" href="signup.html">Create an account</a>
        </p>
      </div>
    </section>
  </main>

  <div id="site-footer-root"></div>
  <script src="layout.js"></script>
</body>
</html>
