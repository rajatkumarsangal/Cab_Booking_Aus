<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizz Cabs | Admin Login</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body data-admin-page="login">
  <main class="login-shell">
    <section class="login-panel">
      <p class="eyebrow">Admin access</p>
      <h1>Log in to Wizz Cabs Admin</h1>
      <p class="login-copy">Use the temporary frontend credentials to manage local website settings.</p>

      <form id="admin-login-form" class="login-form">
        <label class="field">
          <span>Username</span>
          <input id="admin-username" type="text" autocomplete="username" autofocus>
        </label>
        <label class="field">
          <span>Password</span>
          <input id="admin-password" type="password" autocomplete="current-password">
        </label>
        <p class="form-message" id="login-message" hidden></p>
        <button class="primary-button" type="submit">Log In</button>
      </form>
    </section>
  </main>

  <script src="../site-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
